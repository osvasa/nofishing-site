<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NøFishing AI — You're Protected</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--red:#EC220C;--black:#111111;--white:#ffffff;}
body{font-family:'Inter',sans-serif;background:var(--black);color:var(--white);min-height:100vh;display:flex;flex-direction:column;}
nav{background:var(--black);padding:0 48px;height:56px;display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,0.08);}
.success-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px;}
.success-card{text-align:center;max-width:440px;width:100%;}
.check-circle{width:80px;height:80px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;}
.check-circle span{font-size:40px;font-weight:900;color:var(--white);line-height:1;}
.success-title{font-size:32px;font-weight:900;margin-bottom:8px;letter-spacing:-0.02em;}
.success-sub{font-size:15px;color:rgba(255,255,255,0.7);line-height:1.6;margin-bottom:28px;}
.plan-badge{display:inline-block;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:14px 28px;margin-bottom:28px;}
.plan-badge-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.45);margin-bottom:4px;}
.plan-badge-price{font-size:24px;font-weight:900;color:var(--white);}
.active-status{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:32px;}
.active-dot{width:10px;height:10px;border-radius:50%;background:#22C55E;animation:pulse 2s ease-in-out infinite;}
.active-text{font-size:14px;font-weight:700;color:#22C55E;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.btn-home{display:inline-block;padding:13px 32px;background:var(--red);color:var(--white);border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:15px;font-weight:800;text-decoration:none;cursor:pointer;transition:opacity 0.15s;}
.btn-home:hover{opacity:0.9;}
.footer-bottom{background:#222;color:rgba(255,255,255,0.6);text-align:center;padding:16px 48px;font-size:12px;line-height:1.7;}
@media(max-width:520px){nav{padding:0 16px;}.success-title{font-size:26px;}}
</style>
</head>
<body>

<nav>
  <a href="/" style="text-decoration:none;">
    <img src="images/logo.png" alt="NOFISHING AI" style="height:30px;width:auto;display:block;">
  </a>
</nav>

<div class="success-wrap">
  <div class="success-card">
    <div class="check-circle"><span>&#10003;</span></div>
    <h1 class="success-title">Payment Confirmed.</h1>
    <p class="success-sub">You can close this tab and return to your browser.</p>
  </div>
</div>

<div class="footer-bottom">
  Copyright &copy; 2026 NøFishing AI &mdash; All Rights Reserved.
</div>


</body>
</html>
