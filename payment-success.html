<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NøFishing AI — You're Protected</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--red:#EC220C;--black:#111111;--white:#ffffff;}
body{font-family:'Inter',sans-serif;background:var(--black);color:var(--white);min-height:100vh;display:flex;flex-direction:column;}
nav{background:var(--black);padding:0 48px;height:56px;display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,0.08);}
.success-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px;}
.success-card{text-align:center;max-width:440px;width:100%;}
.check-circle{width:80px;height:80px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;}
.check-circle span{font-size:40px;font-weight:900;color:var(--white);line-height:1;}
.success-title{font-size:32px;font-weight:900;margin-bottom:8px;letter-spacing:-0.02em;}
.success-sub{font-size:15px;color:rgba(255,255,255,0.7);line-height:1.6;margin-bottom:28px;}
.plan-badge{display:inline-block;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:14px 28px;margin-bottom:28px;}
.plan-badge-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.45);margin-bottom:4px;}
.plan-badge-price{font-size:24px;font-weight:900;color:var(--white);}
.active-status{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:32px;}
.active-dot{width:10px;height:10px;border-radius:50%;background:#22C55E;animation:pulse 2s ease-in-out infinite;}
.active-text{font-size:14px;font-weight:700;color:#22C55E;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.btn-close{display:block;width:100%;padding:15px 32px;background:var(--red);color:var(--white);border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:opacity 0.15s;}
.btn-close:hover{opacity:0.9;}
.footer-bottom{background:#222;color:rgba(255,255,255,0.6);text-align:center;padding:16px 48px;font-size:12px;line-height:1.7;}
@media(max-width:520px){nav{padding:0 16px;}.success-title{font-size:26px;}}
</style>
</head>
<body>

<nav>
  <a href="/" style="text-decoration:none;">
    <img src="images/logo.png" alt="NOFISHING AI" style="height:30px;width:auto;display:block;">
  </a>
</nav>

<div class="success-wrap">
  <div class="success-card">
    <div class="check-circle"><span>&#10003;</span></div>
    <h1 class="success-title">You're Protected.</h1>
    <p class="success-sub">Payment confirmed. NøFishing AI is now actively guarding your browser against phishing, scams, and fraud.</p>
    <div class="plan-badge">
      <div class="plan-badge-label" id="badge-label">Monthly Protection</div>
      <div class="plan-badge-price" id="badge-price">$4.99/month</div>
    </div>
    <div class="active-status">
      <span class="active-dot"></span>
      <span class="active-text">Protection Active</span>
    </div>
    <button class="btn-close cta-button">Start browsing safely &rarr;</button>
  </div>
</div>

<div class="footer-bottom">
  Copyright &copy; 2026 NøFishing AI &mdash; All Rights Reserved.
</div>

<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var plan = params.get('plan');
  if (plan === 'yearly') {
    document.getElementById('badge-label').textContent = 'Yearly Protection';
    document.getElementById('badge-price').textContent = '$49.99/year';
  }

  // Notify the NøFishing AI extension that payment succeeded
  // Try known Chrome extension IDs, then fallback to postMessage for content script
  function notifyExtension() {
    var message = { type: 'ACTIVATE_SESSION', activated: true };

    // Try sending via chrome.runtime.sendMessage (requires externally_connectable)
    if (typeof chrome !== 'undefined' && chrome.runtime && chrome.runtime.sendMessage) {
      // Try to detect extension — iterate known IDs or use discovery
      // The extension content script will also pick up the postMessage fallback
      try {
        // Broadcast via postMessage for content script pickup
        window.postMessage({ source: 'nofishing-website', type: 'ACTIVATE_SESSION', activated: true }, '*');
      } catch (e) {}
    }
  }

  notifyExtension();

  document.querySelector('.cta-button').addEventListener('click', () => {
    window.postMessage({ source: 'nofishing-payment', type: 'CLOSE_TAB' }, '*');
    setTimeout(() => { window.open('', '_self').close(); }, 500);
  });
})();
</script>

</body>
</html>
