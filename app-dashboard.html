<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>NøFishing AI — Dashboard</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#111111"/>
<link rel="manifest" href="/manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--red:#EC220C;--black:#111111;--white:#ffffff;}
body{font-family:'Inter',sans-serif;background:var(--black);color:var(--white);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #222;}
.topbar img{height:24px;width:auto;}
.btn-logout-sm{background:none;border:1px solid #333;color:rgba(255,255,255,0.5);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;padding:6px 12px;border-radius:6px;cursor:pointer;}
.content{flex:1;padding:20px 20px 100px;max-width:480px;width:100%;margin:0 auto;}
.welcome{font-size:20px;font-weight:900;margin-bottom:4px;}
.welcome-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:20px;}
.stats{display:flex;gap:8px;margin-bottom:16px;}
.stat-box{flex:1;background:#1a1a1a;border-radius:12px;padding:14px 8px;text-align:center;border:1px solid #222;}
.stat-num{font-size:26px;font-weight:900;line-height:1;margin-bottom:4px;}
.stat-label{font-size:8px;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.04em;}
.stat-num.safe{color:#22C55E;}
.stat-num.warning{color:#F59E0B;}
.stat-num.danger{color:var(--red);}
.stat-num.none{color:rgba(255,255,255,0.2);}
.card{background:#1a1a1a;border-radius:12px;padding:14px;margin-bottom:16px;border:1px solid #222;}
.card-title{font-size:10px;font-weight:700;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;}
.card-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;}
.card-label{font-size:12px;color:rgba(255,255,255,0.45);font-weight:600;}
.card-value{font-size:12px;color:var(--white);font-weight:500;text-align:right;max-width:60%;word-break:break-all;}
.scan-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #222;}
.scan-item:last-child{border-bottom:none;}
.scan-badge{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.scan-badge.safe{background:#22C55E;}
.scan-badge.warning{background:#F59E0B;}
.scan-badge.danger{background:var(--red);}
.scan-url{font-size:12px;color:rgba(255,255,255,0.6);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.scan-time{font-size:10px;color:rgba(255,255,255,0.25);flex-shrink:0;white-space:nowrap;}
.scan-empty{font-size:12px;color:rgba(255,255,255,0.2);padding:12px 0;text-align:center;}
.note{font-size:10px;color:rgba(255,255,255,0.2);text-align:center;margin-bottom:16px;}
.btn-scan{display:block;width:100%;padding:16px;background:var(--red);color:var(--white);border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:16px;text-decoration:none;text-align:center;transition:opacity 0.15s;}
.btn-scan:hover{opacity:0.9;}
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid #222;display:flex;justify-content:space-around;padding:10px 0 env(safe-area-inset-bottom, 10px);z-index:100;}
.bottomnav a{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:rgba(255,255,255,0.35);font-size:10px;font-weight:600;transition:color 0.2s;}
.bottomnav a.active{color:var(--red);}
.bottomnav svg{width:20px;height:20px;}
.loading{text-align:center;padding:40px 0;color:rgba(255,255,255,0.3);font-size:13px;}
</style>
</head>
<body>
<div class="topbar">
  <a href="/"><img src="/images/logo.png" alt="NøFishing AI"/></a>
  <button class="btn-logout-sm" id="btn-logout">Log Out</button>
</div>

<div class="content">
  <div class="loading" id="loading">Loading...</div>
  <div id="dashboard" style="display:none;">
    <div class="welcome" id="welcome-name">Welcome back</div>
    <div class="welcome-sub">Your AI protection is active.</div>

    <div class="stats">
      <div class="stat-box"><div class="stat-num" id="s-total">0</div><div class="stat-label">URLs Checked</div></div>
      <div class="stat-box"><div class="stat-num" id="s-threats">0</div><div class="stat-label">Threats Caught</div></div>
      <div class="stat-box"><div class="stat-num safe" id="s-rate">100%</div><div class="stat-label">Safe Rate</div></div>
    </div>

    <div class="card">
      <div class="card-title">Recent Scans</div>
      <div id="recent-scans"><div class="scan-empty">No scans yet. Try scanning a QR code!</div></div>
    </div>

    <div class="note">Browser extension stats tracked separately on desktop</div>
  </div>
</div>

<div class="bottomnav">
  <a href="/scan">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    Scan
  </a>
  <a href="/app/dashboard" class="active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Dashboard
  </a>
  <a href="/app/account">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Account
  </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function() {
  var SUPABASE_URL = 'https://pbdlyfdcrqeddqixbqoy.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_rezQfX2x_cmLfB7iFu6vJg_BRJAPrjp';
  var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  sb.auth.getSession().then(function(res) {
    if (!res.data.session) { window.location.href = '/app'; return; }
    loadDashboard(res.data.session);
  });

  document.getElementById('btn-logout').addEventListener('click', async function() {
    await sb.auth.signOut();
    window.location.href = '/app';
  });

  function showDashboard() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
  }

  async function loadDashboard(session) {
    var userId = session.user.id;
    var email = session.user.email;

    // Timeout: show dashboard with zeros after 5 seconds no matter what
    var loadingTimeout = setTimeout(function() {
      console.log('[NøFishing] Dashboard load timeout — showing with defaults');
      showDashboard();
    }, 5000);

    try {
      var profileRes = await sb.from('profiles').select('first_name, plan, activated, created_at, email').eq('id', userId).single();
      var profile = profileRes.data;

      if (!profile || !profile.activated) {
        clearTimeout(loadingTimeout);
        window.location.href = '/app';
        return;
      }

      var firstName = profile.first_name || 'there';
      firstName = firstName.charAt(0).toUpperCase() + firstName.slice(1);
      document.getElementById('welcome-name').textContent = 'Welcome back, ' + firstName;

      clearTimeout(loadingTimeout);
      showDashboard();

      // Load scan stats
      var statsEmail = profile.email || email;
      console.log('[NøFishing] Loading scan stats for:', statsEmail);

      try {
        var statsRes = await fetch('/api/get-scan-stats?email=' + encodeURIComponent(statsEmail));
        if (!statsRes.ok) throw new Error('API returned ' + statsRes.status);
        var stats = await statsRes.json();

        document.getElementById('s-total').textContent = stats.total || 0;
        document.getElementById('s-threats').textContent = stats.threats || 0;

        var rate = stats.safeRate !== undefined ? stats.safeRate : 100;
        var rateEl = document.getElementById('s-rate');
        rateEl.textContent = rate + '%';
        rateEl.className = 'stat-num ' + (rate >= 90 ? 'safe' : rate >= 70 ? 'warning' : 'danger');

        var container = document.getElementById('recent-scans');
        if (stats.recentScans && stats.recentScans.length > 0) {
          container.innerHTML = '';
          stats.recentScans.forEach(function(scan) {
            var item = document.createElement('div');
            item.className = 'scan-item';
            var truncUrl = scan.url.length > 40 ? scan.url.substring(0, 40) + '...' : scan.url;
            item.innerHTML = '<span class="scan-badge ' + scan.result + '"></span>'
              + '<span class="scan-url">' + escapeHtml(truncUrl) + '</span>'
              + '<span class="scan-time">' + timeAgo(scan.scanned_at) + '</span>';
            container.appendChild(item);
          });
        }
      } catch (statsErr) {
        console.log('[NøFishing] Scan stats fetch failed:', statsErr.message);
      }
    } catch (err) {
      console.log('[NøFishing] Dashboard load error:', err.message);
      clearTimeout(loadingTimeout);
      showDashboard();
    }
  }

  function timeAgo(dateStr) {
    var now = Date.now();
    var then = new Date(dateStr).getTime();
    var diff = Math.floor((now - then) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  }

  function escapeHtml(str) { var d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
})();
</script>
</body>
</html>
