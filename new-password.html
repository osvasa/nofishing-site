<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NøFishing AI — New Password</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--red:#EC220C;--black:#111111;--white:#ffffff;}
body{font-family:'Inter',sans-serif;background:var(--red);color:var(--white);min-height:100vh;display:flex;flex-direction:column;}
nav{background:var(--black);padding:0 48px;height:56px;display:flex;align-items:center;position:sticky;top:0;z-index:100;}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px;}
.card{background:var(--black);border-radius:12px;padding:32px 28px;max-width:420px;width:100%;text-align:center;}
.fish{width:80px;height:auto;display:block;margin:0 auto 16px;}
.title{font-size:24px;font-weight:900;margin-bottom:8px;color:var(--white);}
.sub{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.6;margin-bottom:24px;}
.s-field{margin-bottom:14px;text-align:left;}
.s-field label{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.45);margin-bottom:3px;}
.s-field input{width:100%;padding:11px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;font-family:'Inter',sans-serif;font-size:14px;color:var(--white);background:#1a1a1a;transition:border-color 0.2s;-webkit-appearance:none;}
.s-field input:focus{outline:none;border-color:var(--white);}
.s-field input::placeholder{color:rgba(255,255,255,0.25);}
.s-field input.input-error{border-color:var(--red) !important;}
.password-wrap{position:relative;}
.password-wrap input{padding-right:40px;}
.password-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;padding:2px;line-height:1;}
.password-toggle:hover{color:#ffffff;}
.field-error{font-size:10px;color:var(--red);margin-top:3px;display:none;}
.field-error.show{display:block;}
.error-banner{font-size:11px;color:var(--red);background:rgba(236,34,12,0.06);border:1px solid rgba(236,34,12,0.15);border-radius:8px;padding:10px 14px;margin-bottom:14px;text-align:center;display:none;}
.error-banner.show{display:block;}
.success-msg{font-size:13px;color:#ffffff;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:12px 14px;margin-bottom:14px;text-align:center;display:none;}
.success-msg.show{display:block;}
.btn{display:block;width:100%;padding:13px 16px;background:var(--red);color:var(--white);border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:opacity 0.15s;}
.btn:hover{opacity:0.9;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.back-link{text-align:center;font-size:12px;color:rgba(255,255,255,0.5);margin-top:16px;}
.back-link a{color:var(--red);text-decoration:none;font-weight:600;}
.back-link a:hover{text-decoration:underline;}
.footer-bottom{background:#222;color:rgba(255,255,255,0.6);display:flex;align-items:center;justify-content:space-between;padding:16px 48px;font-size:12px;line-height:1.7;}
.footer-bottom-left strong{color:rgba(255,255,255,0.9);font-size:13px;font-weight:700;}
.footer-links{display:flex;gap:16px;}
.footer-links a{color:rgba(255,255,255,0.6);font-size:12px;text-decoration:none;transition:color 0.2s;}
.footer-links a:hover{color:var(--white);}
@media(max-width:520px){nav{padding:0 16px;}.wrap{padding:24px 16px;}.card{padding:24px 20px;}}
@media(max-width:680px){.footer-bottom{flex-direction:column;text-align:center;gap:12px;padding:16px 24px;}.footer-links{justify-content:center;}}
</style>
</head>
<body>

<nav>
  <a href="/" style="text-decoration:none;">
    <img src="images/logo.png" alt="NOFISHING AI" style="height:30px;width:auto;display:block;">
  </a>
</nav>

<div class="wrap">
  <div class="card">
    <img src="/images/logo.png" alt="NøFishing AI" style="width:160px;height:auto;display:block;margin:0 auto 24px auto;">
    <div class="title">Create new password</div>
    <p class="sub">Enter your new password below.</p>

    <form id="newpw-form" novalidate>
      <div class="s-field">
        <label for="n-password">New Password</label>
        <div class="password-wrap">
          <input id="n-password" type="password" placeholder="6+ characters"/>
          <button type="button" class="password-toggle" id="btn-toggle-pw" title="Show password"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button>
        </div>
        <div class="field-error" id="err-n-password"></div>
      </div>

      <div class="s-field">
        <label for="n-confirm">Confirm Password</label>
        <div class="password-wrap">
          <input id="n-confirm" type="password" placeholder="Re-enter password"/>
          <button type="button" class="password-toggle" id="btn-toggle-confirm" title="Show password"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button>
        </div>
        <div class="field-error" id="err-n-confirm"></div>
      </div>

      <div class="error-banner" id="newpw-error-banner"></div>
      <div class="success-msg" id="newpw-success"></div>
      <button type="submit" class="btn" id="btn-newpw">Update Password</button>
    </form>

  </div>
</div>

<div class="footer-bottom">
  <div class="footer-bottom-left">
    <strong>AI-Powered Phishing Protection</strong>
    Copyright &copy; 2026 NøFishing AI &mdash; All Rights Reserved.
  </div>
  <div class="footer-links">
    <a href="/privacy">Privacy Policy</a>
    <a href="/terms">Terms of Use</a>
    <a href="mailto:hello@nofishing.ai">Contact Us</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SUPABASE_URL = 'https://pbdlyfdcrqeddqixbqoy.supabase.co';
var SUPABASE_KEY = 'sb_publishable_rezQfX2x_cmLfB7iFu6vJg_BRJAPrjp';
var sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

var eyeClosed = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
var eyeOpen = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';

function togglePassword(btnId, inputId) {
  document.getElementById(btnId).addEventListener('click', function() {
    var input = document.getElementById(inputId);
    var btn = document.getElementById(btnId);
    if (input.type === 'password') {
      input.type = 'text';
      btn.innerHTML = eyeOpen;
    } else {
      input.type = 'password';
      btn.innerHTML = eyeClosed;
    }
  });
}
togglePassword('btn-toggle-pw', 'n-password');
togglePassword('btn-toggle-confirm', 'n-confirm');

['n-password','n-confirm'].forEach(function(id) {
  document.getElementById(id).addEventListener('input', function() {
    document.getElementById(id).classList.remove('input-error');
    document.getElementById('err-' + id).classList.remove('show');
  });
});

document.getElementById('newpw-form').addEventListener('submit', async function(e) {
  e.preventDefault();

  document.getElementById('n-password').classList.remove('input-error');
  document.getElementById('err-n-password').classList.remove('show');
  document.getElementById('n-confirm').classList.remove('input-error');
  document.getElementById('err-n-confirm').classList.remove('show');
  document.getElementById('newpw-error-banner').classList.remove('show');
  document.getElementById('newpw-success').classList.remove('show');

  var password = document.getElementById('n-password').value;
  var confirm = document.getElementById('n-confirm').value;
  var valid = true;

  if (!password) {
    document.getElementById('n-password').classList.add('input-error');
    var el = document.getElementById('err-n-password');
    el.textContent = 'Password is required';
    el.classList.add('show');
    valid = false;
  } else if (password.length < 6) {
    document.getElementById('n-password').classList.add('input-error');
    var el = document.getElementById('err-n-password');
    el.textContent = 'Must be at least 6 characters';
    el.classList.add('show');
    valid = false;
  }

  if (!confirm) {
    document.getElementById('n-confirm').classList.add('input-error');
    var el = document.getElementById('err-n-confirm');
    el.textContent = 'Please confirm your password';
    el.classList.add('show');
    valid = false;
  } else if (password && confirm !== password) {
    document.getElementById('n-confirm').classList.add('input-error');
    var el = document.getElementById('err-n-confirm');
    el.textContent = 'Passwords do not match';
    el.classList.add('show');
    valid = false;
  }

  if (!valid) return;

  var btn = document.getElementById('btn-newpw');
  btn.disabled = true;
  btn.textContent = 'Updating...';

  try {
    var result = await sbClient.auth.updateUser({ password: password });

    if (result.error) {
      var banner = document.getElementById('newpw-error-banner');
      banner.textContent = result.error.message;
      banner.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Update Password';
      return;
    }

    document.getElementById('newpw-success').textContent = 'Your new password has been set. You can now log in to your extension.';
    document.getElementById('newpw-success').classList.add('show');
    btn.disabled = true;
    btn.textContent = 'Password Updated';
  } catch (err) {
    var banner = document.getElementById('newpw-error-banner');
    banner.textContent = 'Something went wrong. Please try again.';
    banner.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Update Password';
  }
});
</script>

</body>
</html>
