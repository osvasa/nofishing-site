<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NøFishing AI — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--red:#EC220C;--black:#111111;--white:#ffffff;}
body{font-family:'Inter',sans-serif;background:var(--red);color:var(--white);min-height:100vh;display:flex;flex-direction:column;}
nav{background:var(--black);padding:0 48px;height:56px;display:flex;align-items:center;position:sticky;top:0;z-index:100;}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px;}
.card{background:var(--black);border-radius:12px;padding:32px 28px;max-width:420px;width:100%;text-align:center;}
.fish{width:80px;height:auto;display:block;margin:0 auto 16px;}
.title{font-size:24px;font-weight:900;margin-bottom:8px;color:var(--white);}
.sub{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.6;margin-bottom:24px;}
.s-field{margin-bottom:14px;text-align:left;}
.s-field label{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.45);margin-bottom:3px;}
.s-field input{width:100%;padding:11px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;font-family:'Inter',sans-serif;font-size:14px;color:var(--white);background:#1a1a1a;transition:border-color 0.2s;-webkit-appearance:none;}
.s-field input:focus{outline:none;border-color:var(--white);}
.s-field input::placeholder{color:rgba(255,255,255,0.25);}
.s-field input.input-error{border-color:var(--red) !important;}
.field-error{font-size:10px;color:var(--red);margin-top:3px;display:none;}
.field-error.show{display:block;}
.error-banner{font-size:11px;color:var(--red);background:rgba(236,34,12,0.06);border:1px solid rgba(236,34,12,0.15);border-radius:8px;padding:10px 14px;margin-bottom:14px;text-align:center;display:none;}
.error-banner.show{display:block;}
.success-msg{font-size:13px;color:#22C55E;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:8px;padding:12px 14px;margin-bottom:14px;text-align:center;display:none;}
.success-msg.show{display:block;}
.btn{display:block;width:100%;padding:13px 16px;background:var(--red);color:var(--white);border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:opacity 0.15s;}
.btn:hover{opacity:0.9;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.back-link{text-align:center;font-size:12px;color:rgba(255,255,255,0.5);margin-top:16px;}
.back-link a{color:var(--red);text-decoration:none;font-weight:600;}
.back-link a:hover{text-decoration:underline;}
.footer-bottom{background:#222;color:rgba(255,255,255,0.6);display:flex;align-items:center;justify-content:space-between;padding:16px 48px;font-size:12px;line-height:1.7;}
.footer-bottom-left strong{color:rgba(255,255,255,0.9);font-size:13px;font-weight:700;}
.footer-links{display:flex;gap:16px;}
.footer-links a{color:rgba(255,255,255,0.6);font-size:12px;text-decoration:none;transition:color 0.2s;}
.footer-links a:hover{color:var(--white);}
@media(max-width:520px){nav{padding:0 16px;}.wrap{padding:24px 16px;}.card{padding:24px 20px;}}
@media(max-width:680px){.footer-bottom{flex-direction:column;text-align:center;gap:12px;padding:16px 24px;}.footer-links{justify-content:center;}}
</style>
</head>
<body>

<nav>
  <a href="/" style="text-decoration:none;">
    <img src="images/logo.png" alt="NOFISHING AI" style="height:30px;width:auto;display:block;">
  </a>
</nav>

<div class="wrap">
  <div class="card">
    <img src="images/nofishing-ai-bubbles.gif" alt="NøFishing AI" class="fish"/>
    <div class="title">Reset your password</div>
    <p class="sub">Enter your email and we'll send you a reset link.</p>

    <form id="reset-form" novalidate>
      <div class="s-field">
        <label for="r-email">Email</label>
        <input id="r-email" type="email" placeholder="you@example.com"/>
        <div class="field-error" id="err-r-email"></div>
      </div>

      <div class="error-banner" id="reset-error-banner"></div>
      <div class="success-msg" id="reset-success"></div>
      <button type="submit" class="btn" id="btn-reset">Send Reset Link</button>
    </form>

    <div class="back-link">Remember your password? <a href="/login">Log in</a></div>
  </div>
</div>

<div class="footer-bottom">
  <div class="footer-bottom-left">
    <strong>AI-Powered Phishing Protection</strong>
    Copyright &copy; 2026 NøFishing AI &mdash; All Rights Reserved.
  </div>
  <div class="footer-links">
    <a href="/privacy">Privacy Policy</a>
    <a href="/terms">Terms of Use</a>
    <a href="mailto:hello@nofishing.ai">Contact Us</a>
  </div>
</div>

<script>
document.getElementById('r-email').addEventListener('input', function() {
  document.getElementById('r-email').classList.remove('input-error');
  document.getElementById('err-r-email').classList.remove('show');
});

document.getElementById('reset-form').addEventListener('submit', async function(e) {
  e.preventDefault();

  document.getElementById('r-email').classList.remove('input-error');
  document.getElementById('err-r-email').classList.remove('show');
  document.getElementById('reset-error-banner').classList.remove('show');
  document.getElementById('reset-success').classList.remove('show');

  var email = document.getElementById('r-email').value.trim();

  if (!email) {
    document.getElementById('r-email').classList.add('input-error');
    var el = document.getElementById('err-r-email');
    el.textContent = 'Email is required';
    el.classList.add('show');
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('r-email').classList.add('input-error');
    var el = document.getElementById('err-r-email');
    el.textContent = 'Enter a valid email';
    el.classList.add('show');
    return;
  }

  var btn = document.getElementById('btn-reset');
  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    var resp = await fetch('/api/send-reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email }),
    });
    var data = await resp.json();

    if (!resp.ok || data.error) {
      var banner = document.getElementById('reset-error-banner');
      banner.textContent = data.error || 'Something went wrong. Please try again.';
      banner.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Send Reset Link';
      return;
    }

    document.getElementById('reset-success').textContent = 'Check your email for the reset link.';
    document.getElementById('reset-success').classList.add('show');
    btn.disabled = true;
    btn.textContent = 'Email Sent';
  } catch (err) {
    var banner = document.getElementById('reset-error-banner');
    banner.textContent = 'Something went wrong. Please try again.';
    banner.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Send Reset Link';
  }
});
</script>

</body>
</html>
