<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NøFishing AI — Check Your Email</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--red:#EC220C;--black:#111111;--white:#ffffff;}
body{font-family:'Inter',sans-serif;background:var(--red);color:var(--white);min-height:100vh;display:flex;flex-direction:column;}
nav{background:var(--black);padding:0 48px;height:56px;display:flex;align-items:center;position:sticky;top:0;z-index:100;}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px;}
.card{background:var(--black);border-radius:12px;padding:40px 32px;max-width:440px;width:100%;text-align:center;}
.card-fish{width:80px;height:auto;display:block;margin:0 auto 20px;}
.card-title{font-size:28px;font-weight:900;color:var(--white);margin-bottom:12px;}
.card-sub{font-size:14px;color:rgba(255,255,255,0.7);line-height:1.6;margin-bottom:24px;}
.card-sub strong{color:var(--white);font-weight:700;}
.card-hint{font-size:12px;color:rgba(255,255,255,0.4);}
.footer-bottom{background:#222;color:rgba(255,255,255,0.6);display:flex;align-items:center;justify-content:space-between;padding:16px 48px;font-size:12px;line-height:1.7;}
.footer-bottom-left strong{color:rgba(255,255,255,0.9);font-size:13px;font-weight:700;}
.footer-links{display:flex;gap:16px;}
.footer-links a{color:rgba(255,255,255,0.6);font-size:12px;text-decoration:none;transition:color 0.2s;}
.footer-links a:hover{color:var(--white);}
@media(max-width:520px){nav{padding:0 16px;}.wrap{padding:24px 16px;}.card{padding:32px 20px;}}
@media(max-width:680px){.footer-bottom{flex-direction:column;text-align:center;gap:12px;padding:16px 24px;}.footer-links{justify-content:center;}}
</style>
</head>
<body>

<nav>
  <a href="/" style="text-decoration:none;">
    <img src="images/logo.png" alt="NOFISHING AI" style="height:30px;width:auto;display:block;">
  </a>
</nav>

<div class="wrap">
  <div class="card">
    <img src="images/nofishing-ai-bubbles.gif" alt="NøFishing AI" class="card-fish"/>
    <h1 class="card-title">Check your email!</h1>
    <p class="card-sub">We sent a confirmation link to <strong id="confirm-email">your email</strong>. Click it to confirm your account and choose your plan.</p>
    <p class="card-hint">Didn't get it? Check your spam folder.</p>
  </div>
</div>

<div class="footer-bottom">
  <div class="footer-bottom-left">
    <strong>AI-Powered Phishing Protection</strong>
    Copyright &copy; 2026 NøFishing AI &mdash; All Rights Reserved.
  </div>
  <div class="footer-links">
    <a href="/privacy">Privacy Policy</a>
    <a href="/terms">Terms of Use</a>
    <a href="mailto:hello@nofishing.ai">Contact Us</a>
  </div>
</div>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var email = params.get('email');
  if (email) {
    document.getElementById('confirm-email').textContent = email;
  }
})();
</script>

</body>
</html>
